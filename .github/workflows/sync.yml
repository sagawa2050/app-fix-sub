name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main] 

  # Cho phép bạn bấm chạy thủ công trên GitHub nếu cần
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://sagawa779:${HF_TOKEN}@huggingface.co/spaces/sagawa779/app_fix_sub main
