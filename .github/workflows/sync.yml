name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main] # Thay bằng 'master' nếu nhánh chính trên GitHub của bạn tên là master

  # Cho phép kích hoạt thủ công từ tab Actions
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://sagawa779:${HF_TOKEN}@huggingface.co/spaces/USERNAME_CỦA_BẠN/sagawa779/app_fix_sub main
